; Sunshine Configuration File
; https://github.com/LizardByte/Sunshine

# General configuration
address_family = both
address = 0.0.0.0
port = 47989

# TLS configuration omitted to use Sunshine defaults

# Credentials - CHANGE THESE!
username = admin
password = change_me

# Logging 
log_level = info

# Video Encoder Configuration for NVIDIA GPU (GTX 1080 Ti)
encoder = nvenc  ; Use NVIDIA encoder
output_name = nvidia-enc
# Advanced options for NVIDIA encoder
# Options depend on NVIDIA driver and capabilities
quality = high  ; Options: low, medium, high
bitrate = 20000  ; bitrate in kbps (20 Mbps)
framerate = 60

# Audio Configuration
audio_sink = 
channels = stereo
samplerate = 48000

# Input Mapping (mouse/keyboard)
input_left_stick = [-32768, -32767]
input_right_stick = [-32768, -32767]
input_gamepad = [-32768, -32767]

# Virtual input device
virtual_input = /dev/uinput

# OpenGL Configuration
screen_left = 0
screen_top = 0
screen_width = 1920
screen_height = 1080

# Network Configuration
# UDP stream port
port = 47990

# Control protocol port
port = 47989

# Websocket port (for web UI and Moonlight)
port = 48010

# Turbo mode - allows higher speeds but uses more resources
turbo = 0

# Enable performance statistics
stats = 1
